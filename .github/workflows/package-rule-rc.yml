# SPDX-License-Identifier: Apache-2.0

name: Rule Executer - Rule processor Automation

on:
  push:
    branches:
      - dev
  repository_dispatch:
    types: [rule-executer-update]  # Matches event-type from dispatch
  workflow_dispatch:

jobs:
  automate-rule-executer:
    if: github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN_LIB }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up NPM authentication
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_TOKEN_LIB }}" > ~/.npmrc
          cat .npmrc

      # Step 2: Clone Rule Executer Repo and delete package-lock.json file
      - name: Clone Rule Executer Repo
        run: |
          echo "Cloning Rule Executer repo and removing package-lock.json file..."
          git clone https://github.com/tazama-lf/rule-executer -b dev
          cd rule-executer 
          sed -i 's/${GH_TOKEN}/${{ secrets.GH_TOKEN_LIB }}/' .npmrc 
          cat .npmrc
          rm package-lock.json
          cd ..
          echo "Clone completed."

      # Step 3: Duplicate Rule Executer Folder to 'rule-executer-902'
      - name: Duplicate Rule Executer Folder
        run: |
          echo "Duplicating Rule Executer folder..."
          cp -R rule-executer rule-executer-902
          echo "Rule Executer folders duplicated."

      # Step 4: Update the version in package.json and rule number in Dockerfile
      - name: Modify Rule Executer Files
        run: |
          echo "Modifying rule-executer-902 files..."
          packageVersion=$(jq -r '.version' package.json)
          echo "Fetched version from package.json: $packageVersion"
          # Extract rule-901 version, ensuring only the version number is captured
          rule901Version=$(jq -r '.dependencies["@frmscoe/rule-901"] // .dependencies["@tazama-lf/rule-901"]' rule-executer-902/package.json | grep -o '[0-9][0-9.]*-rc\.[0-9]\+')
          if [ -z "$rule901Version" ]; then
            echo "❌ Error: Could not determine rule-901 version in rule-executer-902/package.json"
            exit 1
          fi
          echo "Fetched rule-901 version from rule-executer package.json: $rule901Version"
          # Replace rule-901 with rule-902 using the packageVersion directly
          sed -i "s/rule-901@$rule901Version/rule-902@$packageVersion/" rule-executer-902/package.json
          sed -i 's/901/902/' rule-executer-902/Dockerfile
          echo "Successfully modified rule-executer-902 files."

      # Verify Changes in modified files
      - name: Verify Changes
        run: |
          cat rule-executer-902/package.json
          cat rule-executer-902/Dockerfile

      # Step 5: Build Rule Packages
      - name: Build Rule Packages
        run: |
          echo "Building rule packages..."
          cd rule-executer-902 && npm install
          echo "Rule packages built."

      # Step 6: Build and Push Docker Image
      - name: Build and Push Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "Packaging rule processors into Docker image..."
          docker build --no-cache -t tazamaorg/rule-902:rc rule-executer-902
          echo "Logging into DockerHub..."
          echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin
          docker push tazamaorg/rule-902:rc
          docker rmi tazamaorg/rule-902:rc
          echo "Docker Image creation and push complete."

      # Step 6: Send Slack Notification
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"blocks": [{"type": "header","text": {"type": "plain_text","text": "New Rule Release Candidate Dockerhub Image published :ship:","emoji": true}},{"type": "section","fields": [{"type": "mrkdwn","text": "*Service:*\nRule-902"},{"type": "mrkdwn","text": "*Tazama Dockerhub:*\n<https://hub.docker.com/orgs/tazamaorg/repositories>"}]}]}' $SLACK_WEBHOOK_URL